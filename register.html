<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="login-body">

<div class="login-container">

    <h1>Smart Learning Mentor</h1>

    <h2>Student Registration</h2>

    <form>

        <input type="text"
               placeholder="Full Name"
               required>

        <input type="email"
               placeholder="Email"
               required>

        <input type="password"
               placeholder="Password"
               required>

        <input type="text"
               placeholder="Department"
               required>

        <input type="number"
               placeholder="Semester"
               required>

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have an account?

        <a href="/login">
            Login
        </a>
    </p>

</div>

</body>
</html>
